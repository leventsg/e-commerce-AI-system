Name: checkout.rpc
ListenOn: 0.0.0.0:10005
Timeout: 0
Consul:
  Host: localhost:8500 # consul endpoint
  Key: checkout.rpc
  Meta:
    Protocol: grpc

MysqlConfig:
  datasource: "root:root@tcp(localhost:33061)/mall?charset=utf8mb4&parseTime=True&loc=Asia%2FShanghai&time_zone=%27%2B08%3A00%27"
  conntimeout: 5

InventoryRpc:
  Target: consul://localhost:8500/inventory.rpc?wait=14s
  NonBlock: true

ProductRpc:
  Target: consul://localhost:8500/products.rpc?wait=14s
  NonBlock: true
  Timeout: 10000
CouponsRpc:
  Target: consul://localhost:8500/coupons.rpc?wait=14s
  NonBlock: true
  Timeout: 10000
RedisConf:
  Host: localhost:6379
  Type: node
  Pass: leventsg
  Tls: false

# 指标监控配置
DevServer:
  Enabled: true
  Host: localhost
  Port: 11005 # 服务端口+1000，如果服务端口是10001，则指标端口就是11001
  EnablePprof: false

# 链路追踪
Telemetry:
  Name: checkout.rpc # 与服务名称保持一致
  Endpoint: http://localhost:14268/api/traces
  Batcher: jaeger
  Sampler: 0.1 # 采样率，1.0表示全部采集, 0.1表示10%
