Name: coupons.rpc
ListenOn: 0.0.0.0:10009


# 服务发现
Consul:
  Host: localhost:8500 # consul endpoint
  Key: coupons.rpc
  Meta:
    Protocol: grpc

# 链路追踪
Telemetry:
  Name: coupons.rpc
  Endpoint: http://localhost:14268/api/traces
  Batcher: jaeger
  Sampler: 1.0

# 指标监控配置
DevServer:
  Enabled: true
  Host: localhost
  Port: 11009
  EnablePprof: false

Log:
  ServiceName: "coupons-rpc"
  Mode: 'console'
  Encoding: "json"
  Path: "./logs/coupons-rpc"

MysqlConfig:
  datasource: "root:root@tcp(localhost:33061)/mall?charset=utf8mb4&parseTime=True&loc=Asia%2FShanghai&time_zone=%27%2B08%3A00%27"


RedisConf:
  Host: localhost:6379
  Type: node
  Pass: leventsg # 如果有密码则填写
  Tls: false


ProductRpc:
  Target: consul://localhost:8500/products.rpc?wait=14s
  NonBlock: true

KafkaMQ:
  Brokers:
    - "localhost:9092"
  Username: ""
  Password: ""
  Topics:
    CancelOrders:
      Topic: "cancel-orders"
      Group: "coupon-cancel-order-consumer"
      Offset: first
      Conns: 1
      Consumers: 1
      Processors: 2
      MinBytes: 10240
      MaxBytes: 10485760
      ForceCommit: false
    TimeoutOrders:
      Topic: "timeout-orders"
      Group: "coupon-timeout-order-consumer"
      Offset: first
      Conns: 1
      Consumers: 1
      Processors: 2
      MinBytes: 10240
      MaxBytes: 10485760
      ForceCommit: false
