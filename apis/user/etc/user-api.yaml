Name: user-api
Host: 0.0.0.0
Port: 8001
Mode: pro
Verbose: false # 关闭详细日志
Timeout: 12000


UserRpc:
  Target: consul://localhost:8500/users.rpc?wait=14s
  NonBlock: true 
AuthsRpc:
  Target: consul://localhost:8500/auths.rpc?wait=14s
  NonBlock: true 

Consul:
  Host: localhost:8500 # consul endpoint
  Key: 
    users.rpc
    auths.rpc
WhitePathList:
  - /douyin/user/login
  - /douyin/user/register
OptionPathList:
  - /douyin/user/address 

Log:
  ServiceName: "user-api"
  Mode: 'file'
  Encoding: "json"
  Path: "./logs/user-api"
  KeepDays: 30    # 保留30天日志
  Compress: true  # 启用日志压缩
  Rotation: size  # 按大小切割日志
  MaxSize: 100    # 每个日志文件最大100MB

# 链路追踪
Telemetry:
  Name: user-api
  Endpoint: http://localhost:14268/api/traces
  Batcher: jaeger
  Sampler: 0.1

DevServer:
  Enabled: true
  Host: localhost
  Port: 8101 # api服务端口+100，例如api端口为8001，指标端口是8101
  EnablePprof: false