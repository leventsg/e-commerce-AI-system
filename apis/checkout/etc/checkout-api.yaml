Name: checkout-api
Host: 0.0.0.0
Port: 8005


CheckoutRpc:
  Target: consul://localhost:8500/checkout.rpc?wait=14s
  NonBlock: true

AuthsRpc:
  Target: consul://localhost:8500/auths.rpc?wait=14s
  NonBlock: true

# 指标监控配置
DevServer:
  Enabled: true
  Host: localhost
  Port: 8105
  EnablePprof: false


# 链路追踪
Telemetry:
  Name: checkout-api
  Endpoint: http://localhost:14268/api/traces
  Batcher: jaeger
  Sampler: 0.1
