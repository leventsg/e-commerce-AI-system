Name: order-api
Host: 0.0.0.0
Port: 8004
Timeout: 0


OrderRpc:
  Target: consul://localhost:8500/order.rpc?wait=14s
  NonBlock: true
  Timeout: 0
AuthsRpc:
  Target: consul://localhost:8500/auths.rpc?wait=14s
  NonBlock: true

DtmRpc:
  Target: consul://localhost:8500/dtmservice?wait=14s
  NonBlock: true

CheckoutRpc:
  Target: consul://localhost:8500/checkout.rpc?wait=14s
  NonBlock: true
CouponsRpc:
  Target: consul://localhost:8500/coupons.rpc?wait=14s
  NonBlock: true

# 指标监控配置
DevServer:
  Enabled: true
  Host: localhost
  Port: 8104
  EnablePprof: false

# 链路追踪
Telemetry:
  Name: order-api
  Endpoint: http://localhost:14268/api/traces
  Batcher: jaeger
  Sampler: 0.1