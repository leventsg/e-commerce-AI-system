root = "."
tmp_dir = "tmp/air-apis"

[build]
cmd = "go build -o ./tmp/air-apis/apis-runner.exe ./start_script/run-apis.go"
bin = "./tmp/air-apis/apis-runner.exe"
delay = 1000
include_ext = ["go", "yaml", "yml", "toml"]
exclude_dir = ["tmp", "logs", "dev_logs", ".git", "construct", "manifests"]
exclude_regex = ["_test\\.go"]
stop_on_error = true
send_interrupt = true
kill_delay = "2s"

[log]
time = true

[misc]
clean_on_exit = true
