filebeat.inputs:
  - type: filestream
    id: go-mall-dev-logs
    enabled: true
    paths:
      - /usr/share/filebeat/logs/*.log
    fields:
      project: go-mall
      env: dev
    fields_under_root: true

processors:
  - add_host_metadata: ~

output.elasticsearch:
  hosts: ["http://elasticsearch:9200"]

setup.kibana:
  host: "http://kibana:5601"

logging.to_files: false
