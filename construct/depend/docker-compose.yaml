services:
  consul:
    container_name: consul
    image: consul:1.8.8
    command: [
      "agent",
      "-dev",
      "-client=0.0.0.0"
    ]
    ports:
      - "8500:8500"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8500/v1/status/leader" ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - go-mall
  redis:
    image: redis/redis-stack-server:latest
    environment:
      REDIS_ARGS: "--requirepass leventsg --appendonly yes"
    restart: unless-stopped
    networks:
      - go-mall
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "leventsg", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    ports:
      - "33061:3306"
    #platform: linux/amd64
    volumes:
      - ./sql:/docker-entrypoint-initdb.d/
    networks:
      - go-mall
    environment:
      MYSQL_ROOT_PASSWORD: 'root'
      MYSQL_DATABASE: 'mall'
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot --silent" ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
  rabbitmq:
    image: rabbitmq:3.8.17-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - go-mall
    environment:
      RABBITMQ_DEFAULT_USER: 'admin'
      RABBITMQ_DEFAULT_PASS: 'admin'
      RABBITMQ_DEFAULT_VHOST: '/'
      TZ: 'Asia/Shanghai'
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "rabbitmqctl status" ]
      interval: 10s
      timeout: 5s
      retries: 5
  kafka:
    container_name: kafka
    image: apache/kafka:3.7.2
    ports:
      - "9092:9092"
    networks:
      - go-mall
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,INTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      TZ: 'Asia/Shanghai'
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
  kafka-ui:
    container_name: kafka-ui
    image: provectuslabs/kafka-ui:latest
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8089:8080"
    networks:
      - go-mall
    environment:
      KAFKA_CLUSTERS_0_NAME: go-mall
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      TZ: 'Asia/Shanghai'
    restart: unless-stopped
  gorse:
    image: zhenghaoz/gorse-in-one
    restart: unless-stopped
    depends_on:
      - redis
      - mysql
    ports:
      - 8086:8086
      - 8087:8087
      - 8088:8088
    environment:
      GORSE_CACHE_STORE: redis://:leventsg@redis:6379/0
      GORSE_DATA_STORE: mysql://root:root@tcp(mysql:3306)/gorse?parseTime=true
    command: >
      --log-path /var/log/gorse/master.log
      --cache-path /var/lib/gorse/master
    volumes:
      - ./conf/gorse.config.toml:/etc/gorse/config.toml
      - gorse_data:/var/lib/gorse
      - gorse_logs:/var/log/gorse
    networks:
      go-mall:
  dtm:
    image: yedf/dtm:latest
    ports:
      - "36789:36789"
      - "36790:36790"
    environment:
      IS_DOCKER: "1"
    command: ["-c", "/app/dtm/configs/config.yaml" ]
    volumes:
      - ./conf/dtm.yaml:/app/dtm/configs/config.yaml
    networks:
      go-mall:


networks:
  go-mall:
    name: go-mall
    #external: true

volumes:
  gorse_data:
  gorse_logs:
